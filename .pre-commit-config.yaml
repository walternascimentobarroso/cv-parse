minimum_pre_commit_version: '3.7.0'

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff format (staged files)
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff-check
        name: Ruff check (entire repo)
        entry: uv run ruff check . --fix
        language: system
        pass_filenames: false

      - id: pyright
        name: Pyright typecheck
        entry: uv run pyright
        language: system
        pass_filenames: false

