services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
      # Debug (debugpy): expose when DEBUGPY=1 in environment
      - "5678:5678"
    environment:
      - DEBUGPY=${DEBUGPY:-}
    volumes:
      - .:/app
      - api_venv:/app/.venv
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  api_venv:

