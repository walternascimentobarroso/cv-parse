version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: "mongodb://mongodb:27017"
      MONGODB_DB: "doctotext"
      MAX_DOCUMENT_SIZE_BYTES: "10485760"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

